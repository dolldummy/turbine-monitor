<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风机状态监控 v3.1 · 精确阈值</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #555;
            --border: #e0e0e0;
            --warning: #f59e0b;
            --danger: #ef4444;
            --normal: #10b981;
            --primary: #3b82f6;
            --shadow: 0 2px 12px rgba(0,0,0,0.05);
            --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
        .container { max-width:1500px; margin:0 auto; padding:20px; }
        header { background:var(--card-bg); border-radius:var(--radius); padding:20px 28px; margin-bottom:20px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
        header h1 { font-size:1.5rem; font-weight:700; display:flex; align-items:center; gap:10px; }
        header h1 span { background:var(--primary); color:#fff; font-size:0.7rem; padding:3px 10px; border-radius:20px; font-weight:500; }
        .btn { padding:9px 18px; border:none; border-radius:8px; font-size:0.88rem; font-weight:600; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--primary); color:#fff; } .btn-primary:hover { background:#2563eb; box-shadow:0 4px 12px rgba(59,130,246,0.3); }
        .btn-outline { background:#fff; color:var(--primary); border:2px solid var(--primary); } .btn-outline:hover { background:#eff6ff; }
        .btn-danger { background:#fff; color:var(--danger); border:2px solid var(--danger); } .btn-danger:hover { background:#fef2f2; }
        .upload-zone { border:3px dashed var(--border); border-radius:var(--radius); padding:40px; text-align:center; cursor:pointer; transition:all 0.3s; background:#fafbfc; margin-bottom:20px; }
        .upload-zone:hover, .upload-zone.drag-over { border-color:var(--primary); background:#eff6ff; }
        .upload-zone .icon { font-size:2.8rem; margin-bottom:10px; }
        .upload-zone p { color:var(--text-secondary); }
        .card { background:var(--card-bg); border-radius:var(--radius); padding:18px 22px; box-shadow:var(--shadow); margin-bottom:18px; }
        .section-title { font-size:1.05rem; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .section-title::before { content:''; width:4px; height:18px; background:var(--primary); border-radius:2px; }
        .stats-row { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:16px; }
        .stat-card { flex:1; min-width:110px; background:#f9fafb; border-radius:10px; padding:14px; text-align:center; border:1px solid var(--border); }
        .stat-card .number { font-size:1.8rem; font-weight:800; }
        .stat-card .label { font-size:0.8rem; color:var(--text-secondary); }
        .stat-card.warning .number { color:var(--warning); } .stat-card.danger .number { color:var(--danger); } .stat-card.normal .number { color:var(--normal); } .stat-card.total .number { color:var(--primary); }
        .table-wrapper { max-height:550px; overflow-y:auto; border-radius:8px; border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; font-size:0.82rem; }
        th,td { padding:9px 6px; text-align:center; border-bottom:1px solid var(--border); white-space:nowrap; }
        th { background:#f8fafc; font-weight:700; position:sticky; top:0; z-index:2; }
        .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-weight:700; font-size:0.75rem; }
        .badge-danger { background:#fef2f2; color:#dc2626; } .badge-warning { background:#fffbeb; color:#d97706; } .badge-normal { background:#ecfdf5; color:#059669; }
        .badge-rising { background:#fff7ed; color:#ea580c; } .badge-stable { background:#f0fdf4; color:#16a34a; } .badge-falling { background:#eff6ff; color:#2563eb; }
        .threshold-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(380px,1fr)); gap:10px; max-height:550px; overflow-y:auto; padding-right:8px; }
        .threshold-item { display:flex; align-items:center; flex-wrap:wrap; gap:4px 8px; background:#f8fafc; padding:8px 12px; border-radius:8px; font-size:0.78rem; }
        .threshold-item label { font-weight:600; min-width:120px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .threshold-item .group { display:flex; align-items:center; gap:3px; }
        .threshold-item .group span { font-size:0.7rem; color:var(--text-secondary); }
        .threshold-item input { width:60px; padding:5px 4px; border:1px solid var(--border); border-radius:5px; text-align:center; font-size:0.78rem; }
        .threshold-item input:focus { outline:2px solid var(--primary); border-color:var(--primary); }
        .hidden { display:none !important; }
        @media (max-width:768px) { .container { padding:8px; } header { padding:14px; } table { font-size:0.7rem; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📊 风机状态监控 v3.1 <span>精确阈值</span></h1>
        <div>
            <button class="btn btn-outline" onclick="toggleThresholdPanel()">⚙️ 阈值配置</button>
            <button class="btn btn-outline" onclick="resetAllThresholds()">🔄 重置为默认阈值</button>
            <button class="btn btn-danger hidden" id="btnClear" onclick="clearAll()">🗑️ 清除</button>
        </div>
    </header>

    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📂</div>
        <p><strong>点击或拖拽 Excel 文件到这里</strong></p>
        <p>支持 .xlsx / .xls，自动识别所有数据列</p>
        <p id="fileNameDisplay" style="color:var(--primary);font-weight:600;"></p>
        <input type="file" id="fileInput" accept=".xlsx,.xls" hidden onchange="handleFile(event)">
    </div>

    <div class="card hidden" id="thresholdCard">
        <div class="section-title">📏 动态测点阈值配置（基于您提供的精确阈值）</div>
        <p style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:10px;">每个测点可独立调整上下限预警/故障值。未设置的项不生效。</p>
        <div class="threshold-grid" id="thresholdGrid"></div>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="reanalyze()">🔄 应用阈值并重新分析</button>
    </div>

    <div class="stats-row hidden" id="statsRow">
        <div class="stat-card total"><div class="number" id="statTotal">0</div><div class="label">总机组</div></div>
        <div class="stat-card normal"><div class="number" id="statNormal">0</div><div class="label">✅ 正常</div></div>
        <div class="stat-card warning"><div class="number" id="statWarning">0</div><div class="label">⚠️ 预警</div></div>
        <div class="stat-card danger"><div class="number" id="statDanger">0</div><div class="label">🚨 故障</div></div>
        <div class="stat-card"><div class="number" id="statRising">0</div><div class="label">📈 趋势升高</div></div>
    </div>

    <div class="card hidden" id="resultCard">
        <div class="section-title">📋 综合状态列表</div>
        <div class="table-wrapper">
            <table><thead><tr><th>机组</th><th>状态</th><th>最高告警测点</th><th>当前值</th><th>阈值信息</th><th>趋势</th><th>建议</th></tr></thead><tbody id="resultBody"></tbody></table>
        </div>
    </div>

    <div class="card hidden" id="detailCard">
        <div class="section-title">🔍 各机组详细数值（点击上方行快速定位）</div>
        <div id="detailContent" style="max-height:400px;overflow-y:auto;"></div>
    </div>
</div>

<script>
    // 全局状态
    let allData = {};
    let allColumns = [];
    let thresholds = {};
    let analysisResult = [];

    // 基于您提供的表格，精确默认阈值（零下限表示不触发告警）
    const keywordDefaults = [
        { keywords: ['齿轮箱HS1轴承温度'], highWarn: 90, highFault: 95, lowWarn: null, lowFault: null },
        { keywords: ['齿轮箱HS2轴承温度'], highWarn: 90, highFault: 95, lowWarn: null, lowFault: null },
        { keywords: ['主轴温度1'], highWarn: 65, highFault: 70, lowWarn: null, lowFault: null },
        { keywords: ['主轴温度2'], highWarn: 65, highFault: 70, lowWarn: null, lowFault: null },
        { keywords: ['齿轮箱油池温度'], highWarn: 75, highFault: 80, lowWarn: null, lowFault: null },
        { keywords: ['发电机绕组u1温度'], highWarn: 145, highFault: 155, lowWarn: null, lowFault: null },
        { keywords: ['发电机绕组u2温度'], highWarn: 145, highFault: 155, lowWarn: null, lowFault: null },
        { keywords: ['发电机绕组v1温度'], highWarn: 145, highFault: 155, lowWarn: null, lowFault: null },
        { keywords: ['发电机绕组v2温度'], highWarn: 145, highFault: 155, lowWarn: null, lowFault: null },
        { keywords: ['发电机绕组w1温度'], highWarn: 145, highFault: 155, lowWarn: null, lowFault: null },
        { keywords: ['发电机绕组w2温度'], highWarn: 145, highFault: 155, lowWarn: null, lowFault: null },
        { keywords: ['发电机冷却水温度'], highWarn: 55, highFault: 60, lowWarn: null, lowFault: null },
        { keywords: ['环境温度'], highWarn: 40, highFault: 50, lowWarn: -25, lowFault: -30 },
        { keywords: ['机舱温度'], highWarn: 50, highFault: 60, lowWarn: -25, lowFault: -30 },
        { keywords: ['机舱控制柜温度'], highWarn: 50, highFault: 60, lowWarn: -18, lowFault: -20 },
        { keywords: ['塔基控制柜温度'], highWarn: 50, highFault: 60, lowWarn: -18, lowFault: -20 },
        { keywords: ['轮毂温度'], highWarn: 50, highFault: 55, lowWarn: null, lowFault: null },
        { keywords: ['塔基温度'], highWarn: 50, highFault: 60, lowWarn: -20, lowFault: -30 },
        { keywords: ['变压器U相绕组温度'], highWarn: 130, highFault: 150, lowWarn: null, lowFault: null },
        { keywords: ['变压器V相绕组温度'], highWarn: 130, highFault: 150, lowWarn: null, lowFault: null },
        { keywords: ['变压器W相绕组温度'], highWarn: 130, highFault: 150, lowWarn: null, lowFault: null },
        { keywords: ['变压器冷却液进口温度'], highWarn: 55, highFault: 60, lowWarn: null, lowFault: null },
        { keywords: ['机舱控制柜温度2'], highWarn: 50, highFault: 60, lowWarn: -18, lowFault: -20 },
        { keywords: ['塔基控制柜温度2'], highWarn: 50, highFault: 60, lowWarn: -18, lowFault: -20 },
        { keywords: ['辅助变压器绕组温度'], highWarn: 130, highFault: 150, lowWarn: null, lowFault: null },
        { keywords: ['发电机冷却空气进口温度1'], highWarn: 62, highFault: 80, lowWarn: null, lowFault: null },
        { keywords: ['发电机冷却空气出口温度'], highWarn: 62, highFault: 80, lowWarn: null, lowFault: null },
        { keywords: ['变流器入水口温度反馈'], highWarn: 50, highFault: 57, lowWarn: null, lowFault: null },
        { keywords: ['IGBT模块温度'], highWarn: 60, highFault: 93, lowWarn: null, lowFault: null },
        { keywords: ['齿轮箱进口压力'], highWarn: 11, highFault: 12, lowWarn: null, lowFault: null },
        { keywords: ['发电机冷却液进口压力'], highWarn: 8, highFault: 8, lowWarn: 1.2, lowFault: 0.6 },
        { keywords: ['变压器冷却液进口压力'], highWarn: 5.5, highFault: 6, lowWarn: 1, lowFault: 0.6 },
        { keywords: ['变流器入水口压力反馈'], highWarn: 5.5, highFault: 6, lowWarn: 1, lowFault: 0.8 },
        // 通用回退规则（当测点名不匹配以上精确项时使用）
        { keywords: ['温度','绕组','轴承','油池','油温','变压器','主轴','轮毂','机舱','塔基','控制柜','变流器','IGBT','辅助变压器','冷却液进口','冷却空气','冷却水'], highWarn: 70, highFault: 85, lowWarn: null, lowFault: null },
        { keywords: ['压力','液压'], highWarn: 20, highFault: 25, lowWarn: 5, lowFault: 3 },
    ];

    function loadThresholdsFromStorage() {
        const saved = localStorage.getItem('turbine_thresholds_v3.1');
        if (saved) { try { thresholds = JSON.parse(saved); } catch { thresholds = {}; } }
    }
    function saveThresholds() { localStorage.setItem('turbine_thresholds_v3.1', JSON.stringify(thresholds)); }

    function getDefaultThreshold(colName) {
        const name = colName.toLowerCase();
        // 按顺序匹配，精确规则优先
        for (let rule of keywordDefaults) {
            for (let kw of rule.keywords) {
                if (name.includes(kw.toLowerCase())) {
                    return {
                        warnHigh: rule.highWarn,
                        faultHigh: rule.highFault,
                        warnLow: rule.lowWarn,
                        faultLow: rule.lowFault,
                    };
                }
            }
        }
        return null;
    }

    function hasAnyThreshold(cfg) {
        return cfg && (cfg.warnHigh !== undefined || cfg.faultHigh !== undefined || cfg.warnLow !== undefined || cfg.faultLow !== undefined);
    }

    function getVal(obj, key) {
        const v = obj[key];
        return (v !== undefined && v !== null && !isNaN(v)) ? v : undefined;
    }

    function renderThresholdPanel() {
        const grid = document.getElementById('thresholdGrid');
        grid.innerHTML = allColumns.map(col => {
            const cfg = thresholds[col] || {};
            const def = getDefaultThreshold(col);
            const wh = getVal(cfg, 'warnHigh') ?? (def ? def.warnHigh : '');
            const fh = getVal(cfg, 'faultHigh') ?? (def ? def.faultHigh : '');
            const wl = getVal(cfg, 'warnLow') ?? (def ? def.warnLow : '');
            const fl = getVal(cfg, 'faultLow') ?? (def ? def.faultLow : '');
            return `
            <div class="threshold-item">
                <label title="${col}">${col}</label>
                <div class="group"><span>↑预警</span><input type="number" step="any" value="${wh}" placeholder="-" onchange="updateColThreshold('${col.replace(/'/g,"\\'")}','warnHigh',this.value)"></div>
                <div class="group"><span>↑故障</span><input type="number" step="any" value="${fh}" placeholder="-" onchange="updateColThreshold('${col.replace(/'/g,"\\'")}','faultHigh',this.value)"></div>
                <div class="group"><span>↓预警</span><input type="number" step="any" value="${wl}" placeholder="-" onchange="updateColThreshold('${col.replace(/'/g,"\\'")}','warnLow',this.value)"></div>
                <div class="group"><span>↓故障</span><input type="number" step="any" value="${fl}" placeholder="-" onchange="updateColThreshold('${col.replace(/'/g,"\\'")}','faultLow',this.value)"></div>
            </div>`;
        }).join('');
    }

    function updateColThreshold(col, field, value) {
        const v = parseFloat(value);
        if (!thresholds[col]) thresholds[col] = {};
        if (isNaN(v)) {
            delete thresholds[col][field];
        } else {
            thresholds[col][field] = v;
        }
        if (!hasAnyThreshold(thresholds[col])) delete thresholds[col];
        saveThresholds();
    }

    function resetAllThresholds() {
        if (!confirm('确定清除所有阈值并恢复为默认精确值吗？')) return;
        thresholds = {};
        allColumns.forEach(col => {
            const def = getDefaultThreshold(col);
            if (def) thresholds[col] = { ...def };
        });
        saveThresholds();
        renderThresholdPanel();
        if (Object.keys(allData).length > 0) analyzeData();
    }

    function toggleThresholdPanel() {
        document.getElementById('thresholdCard').classList.toggle('hidden');
    }

    function handleFile(event) {
        const file = event.target.files[0];
        if (file) processFile(file);
    }
    function processFile(file) {
        document.getElementById('fileNameDisplay').textContent = '📄 ' + file.name;
        const reader = new FileReader();
        reader.onload = e => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, {defval:null});
            parseData(rows);
        };
        reader.readAsArrayBuffer(file);
    }

    function parseData(rows) {
        if (!rows.length) return alert('无有效数据');
        const excludeCols = ['机组名称','时间'];
        allColumns = Object.keys(rows[0]).filter(k => !excludeCols.includes(k));
        const map = {};
        rows.forEach(row => {
            const name = row['机组名称'];
            const timeStr = row['时间'];
            if (!name || !timeStr) return;
            let ts;
            try { ts = new Date(timeStr.replace(' ','T')); if (isNaN(ts.getTime())) throw 0; }
            catch {
                const p = timeStr.split(' '), d = p[0].split('-'), t = p[1] ? p[1].split(':') : [0,0,0];
                ts = new Date(+d[0], +d[1]-1, +d[2], +t[0]||0, +t[1]||0, +t[2]||0);
            }
            if (!map[name]) map[name] = [];
            map[name].push({ts, row});
        });
        Object.keys(map).forEach(n => map[n].sort((a,b)=>a.ts-b.ts));
        allData = map;
        loadThresholdsFromStorage();
        let changed = false;
        allColumns.forEach(col => {
            if (!thresholds[col]) {
                const def = getDefaultThreshold(col);
                if (def) { thresholds[col] = {...def}; changed = true; }
            }
        });
        if (changed) saveThresholds();
        renderThresholdPanel();
        document.getElementById('thresholdCard').classList.remove('hidden');
        analyzeData();
    }

    function evaluatePoint(val, cfg) {
        if (!cfg || isNaN(val)) return {level:'normal', direction:null};
        const fh = getVal(cfg, 'faultHigh');
        const fl = getVal(cfg, 'faultLow');
        const wh = getVal(cfg, 'warnHigh');
        const wl = getVal(cfg, 'warnLow');
        if (fh !== undefined && val >= fh) return {level:'fault', direction:'high'};
        if (fl !== undefined && val <= fl) return {level:'fault', direction:'low'};
        if (wh !== undefined && val >= wh) return {level:'warning', direction:'high'};
        if (wl !== undefined && val <= wl) return {level:'warning', direction:'low'};
        return {level:'normal', direction:null};
    }

    function analyzeData() {
        analysisResult = [];
        const names = Object.keys(allData).sort();
        names.forEach(name => {
            const entries = allData[name];
            const latest = entries[entries.length-1];
            let worstLevel = 'normal', worstCol = '', worstVal = 0, worstDirection = null;
            let worstThresholdInfo = '';
            Object.keys(thresholds).forEach(col => {
                const cfg = thresholds[col];
                if (!hasAnyThreshold(cfg)) return;
                const val = parseFloat(latest.row[col]);
                if (isNaN(val)) return;
                const result = evaluatePoint(val, cfg);
                if (result.level === 'fault' && (worstLevel !== 'fault' || Math.abs(val) > Math.abs(worstVal))) {
                    worstLevel = 'fault'; worstCol = col; worstVal = val; worstDirection = result.direction;
                } else if (result.level === 'warning' && worstLevel !== 'fault' && (worstLevel !== 'warning' || Math.abs(val) > Math.abs(worstVal))) {
                    worstLevel = 'warning'; worstCol = col; worstVal = val; worstDirection = result.direction;
                }
            });
            if (worstCol) {
                const cfg = thresholds[worstCol] || {};
                const parts = [];
                if (getVal(cfg,'warnHigh')!==undefined) parts.push(`↑预警${cfg.warnHigh}`);
                if (getVal(cfg,'faultHigh')!==undefined) parts.push(`↑故障${cfg.faultHigh}`);
                if (getVal(cfg,'warnLow')!==undefined) parts.push(`↓预警${cfg.warnLow}`);
                if (getVal(cfg,'faultLow')!==undefined) parts.push(`↓故障${cfg.faultLow}`);
                worstThresholdInfo = parts.join(' / ');
            }
            let trend = 'stable', trendDetail = '';
            if (worstCol && entries.length >= 2) {
                const firstVal = parseFloat(entries[0].row[worstCol]);
                const lastVal = parseFloat(latest.row[worstCol]);
                if (!isNaN(firstVal) && !isNaN(lastVal) && firstVal !== 0) {
                    const change = lastVal - firstVal;
                    const pct = (change / Math.abs(firstVal)) * 100;
                    if (pct > 5 || change > 5) trend = 'rising';
                    else if (pct < -5 || change < -5) trend = 'falling';
                    trendDetail = `Δ ${change>=0?'+':''}${change.toFixed(2)} (${pct>=0?'+':''}${pct.toFixed(1)}%)`;
                }
            }
            analysisResult.push({ name, level:worstLevel, col:worstCol, value:worstVal, direction:worstDirection, thresholdInfo:worstThresholdInfo, trend, trendDetail, entries });
        });
        const order = {fault:0, warning:1, normal:2};
        analysisResult.sort((a,b) => order[a.level]-order[b.level] || Math.abs(b.value) - Math.abs(a.value));
        renderResults();
    }

    function renderResults() {
        const total = analysisResult.length;
        const normal = analysisResult.filter(r=>r.level==='normal').length;
        const warning = analysisResult.filter(r=>r.level==='warning').length;
        const fault = analysisResult.filter(r=>r.level==='fault').length;
        const rising = analysisResult.filter(r=>r.trend==='rising').length;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statNormal').textContent = normal;
        document.getElementById('statWarning').textContent = warning;
        document.getElementById('statDanger').textContent = fault;
        document.getElementById('statRising').textContent = rising;
        document.getElementById('statsRow').classList.remove('hidden');
        document.getElementById('resultCard').classList.remove('hidden');
        document.getElementById('detailCard').classList.remove('hidden');
        document.getElementById('btnClear').classList.remove('hidden');
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = analysisResult.map(r => {
            let badge, action;
            if (r.level === 'fault') { badge='<span class="badge badge-danger">🚨 故障</span>'; action='立即停机检查'; }
            else if (r.level === 'warning') { badge='<span class="badge badge-warning">⚠️ 预警</span>'; action='加强监视，安排检修'; }
            else { badge='<span class="badge badge-normal">✅ 正常</span>'; action='正常运行'; }
            let trendBadge = r.trend==='rising' ? `<span class="badge badge-rising">📈 ${r.trendDetail||'升高'}</span>` :
                            r.trend==='falling' ? '<span class="badge badge-falling">📉 降低</span>' : '<span class="badge badge-stable">➡️ 稳定</span>';
            const directionStr = r.direction ? (r.direction==='high'?' (过高)':' (过低)') : '';
            const colDisplay = r.col ? r.col + directionStr : '—';
            const bg = r.level==='fault'?'#fef2f2': r.level==='warning'?'#fffbeb':'';
            return `<tr style="background:${bg};cursor:pointer" onclick="scrollToDetail('${r.name}')">
                <td><strong>${r.name}</strong></td><td>${badge}</td><td>${colDisplay}</td>
                <td><strong>${r.value ? r.value.toFixed(2) : '—'}</strong></td>
                <td style="font-size:0.75rem;">${r.thresholdInfo || '—'}</td>
                <td>${trendBadge}</td><td>${action}</td></tr>`;
        }).join('');
        const detailDiv = document.getElementById('detailContent');
        detailDiv.innerHTML = analysisResult.map(r => {
            const items = allColumns.map(col => {
                const val = parseFloat(r.entries[r.entries.length-1].row[col]);
                if (isNaN(val)) return '';
                const cfg = thresholds[col];
                let style = '';
                if (cfg && hasAnyThreshold(cfg)) {
                    const result = evaluatePoint(val, cfg);
                    if (result.level === 'fault') style = 'color:#dc2626;font-weight:700;';
                    else if (result.level === 'warning') style = 'color:#d97706;font-weight:600;';
                }
                return `<span style="${style}margin:3px 10px;display:inline-block;font-size:0.78rem;">${col}: <strong>${val.toFixed(2)}</strong></span>`;
            }).filter(Boolean).join('');
            return `<div id="detail-${r.name}" style="padding:10px;border-bottom:1px solid #eee;"><strong>${r.name}</strong><div style="margin-top:4px;">${items||'无数据'}</div></div>`;
        }).join('');
    }

    function scrollToDetail(name) {
        const el = document.getElementById('detail-'+name);
        if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.background='#fffde7'; setTimeout(()=>el.style.background='',2000); }
    }

    function reanalyze() { if (Object.keys(allData).length) analyzeData(); else alert('请先上传数据文件'); }
    function clearAll() {
        allData = {}; analysisResult = [];
        document.getElementById('statsRow').classList.add('hidden');
        document.getElementById('resultCard').classList.add('hidden');
        document.getElementById('detailCard').classList.add('hidden');
        document.getElementById('btnClear').classList.add('hidden');
        document.getElementById('fileNameDisplay').textContent = '';
    }

    document.addEventListener('DOMContentLoaded', ()=>{
        const zone = document.getElementById('uploadZone');
        zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
        zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
        zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)processFile(f);});
        loadThresholdsFromStorage();
    });
</script>
</body>
</html>
